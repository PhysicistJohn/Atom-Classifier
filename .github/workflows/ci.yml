name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    # Full model regeneration plus calibration and held-out validation
    # deliberately exceeds 90 minutes on a clean runner.
    timeout-minutes: 360
    defaults:
      run:
        working-directory: AtomOS_Classifier
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: AtomOS_Classifier
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/TinySA_Atomizer
          path: TinySA
          token: ${{ secrets.CLASSIFIER_TINYSA_READ_TOKEN }}
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/TinySA_SignalLab
          # Pinned to the exact commit the checked-in model's training corpus
          # came from -- this repo's reproduction/validation must match that
          # data exactly, independent of SignalLab's live/current state.
          ref: 03bc13eb9d5efcfc5f2f9c1792042f670b71ef9a
          path: TinySA_SignalLab
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            AtomOS_Classifier/package-lock.json
            TinySA/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Install TinySA (Atomizer) runtime dependencies
        working-directory: TinySA
        run: npm ci --omit=dev --ignore-scripts
      - name: Install AtomOS_Classifier
        run: npm ci
      - run: npm run typecheck
      - run: npm run check:observable-training-worker
      - run: npm test
      - name: Reproduce the checked-in Bayesian classifier model
        timeout-minutes: 360
        run: npm run check:signal-classifier-model
      - name: Validate the Bayesian classifier against pinned SignalLab
        timeout-minutes: 60
        run: npm run check:signal-classifier
      - name: Verify classifier publication consistency
        run: npm run check:signal-classifier-publication
