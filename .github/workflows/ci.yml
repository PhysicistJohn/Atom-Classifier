name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # verify checks out the Atom-Atomizer and Atom-SignalLab siblings at the
  # exact pinned commits below. All Atom-* repos are public, so the default
  # GITHUB_TOKEN covers the sibling checkouts and no PAT or gate job is
  # needed.
  #
  # Scope: typecheck + the vitest suite (embedding classifier, magnitude
  # flavor, blind recovery parity, Bayesian source closure). The multi-hour
  # Bayesian model regeneration/validation stages were removed from CI when
  # the application dropped the Bayesian classifier for the embedding
  # classifier; regenerate that model deliberately with
  # `npm run check:signal-classifier-model` when it matters.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Atom-Classifier
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-Classifier
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-Atomizer
          # Training/validation imports this exact committed analysis/contracts
          # closure; do not silently follow a moving default branch.
          ref: df6c2ee06003eae94b1e02b52fb50ed0082b3ea7
          path: Atom-Atomizer
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-SignalLab
          # Pinned to the exact commit the checked-in model's training corpus
          # came from -- this repo's reproduction/validation must match that
          # data exactly, independent of SignalLab's live/current state.
          ref: e7d48afbce7165fa04fd551629891123f3b86d34
          path: Atom-SignalLab
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            Atom-Classifier/package-lock.json
            Atom-Atomizer/package-lock.json
            Atom-SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Install Atomizer dependencies
        working-directory: Atom-Atomizer
        # Dev dependencies included: the bare '@tinysa/contracts' imports inside
        # the pinned analysis sources resolve through that workspace package's
        # built dist, and building it needs the repo's toolchain.
        run: npm ci --ignore-scripts
      - name: Build the pinned Atomizer contracts package
        working-directory: Atom-Atomizer
        run: npm run build -w @tinysa/contracts
      - name: Install pinned SignalLab runtime dependencies
        working-directory: Atom-SignalLab
        run: npm ci --omit=dev --ignore-scripts
      - name: Install Atom-Classifier
        run: npm ci
      - run: npm run typecheck
      - run: npm run check:observable-training-worker
      - run: npm test
