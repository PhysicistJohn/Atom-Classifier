name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # verify checks out the Atom-Atomizer and Atom-SignalLab siblings. All
  # Atom-* repos are now public, so the CLASSIFIER_TINYSA_READ_TOKEN repo
  # secret (a fine-grained PAT with read access to those repos) is optional;
  # the gate is kept so forks and remotes without the secret skip the
  # long-running job cleanly instead of running it on every push. The
  # secrets context is not legal in a job-level if, so a one-step gate job
  # exports its presence.
  sibling-token-gate:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.probe.outputs.present }}
    steps:
      - id: probe
        run: echo "present=${{ secrets.CLASSIFIER_TINYSA_READ_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  verify:
    needs: sibling-token-gate
    if: needs.sibling-token-gate.outputs.present == 'true'
    runs-on: ubuntu-latest
    # Full model regeneration plus calibration and held-out validation
    # deliberately exceeds 90 minutes on a clean runner.
    timeout-minutes: 360
    defaults:
      run:
        working-directory: Atom-Classifier
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-Classifier
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-Atomizer
          # Training/validation imports this exact committed analysis/contracts
          # closure; do not silently follow a moving default branch.
          ref: df6c2ee06003eae94b1e02b52fb50ed0082b3ea7
          path: Atom-Atomizer
          token: ${{ secrets.CLASSIFIER_TINYSA_READ_TOKEN }}
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-SignalLab
          # Pinned to the exact commit the checked-in model's training corpus
          # came from -- this repo's reproduction/validation must match that
          # data exactly, independent of SignalLab's live/current state.
          ref: e7d48afbce7165fa04fd551629891123f3b86d34
          path: Atom-SignalLab
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            Atom-Classifier/package-lock.json
            Atom-Atomizer/package-lock.json
            Atom-SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Install Atomizer runtime dependencies
        working-directory: Atom-Atomizer
        run: npm ci --omit=dev --ignore-scripts
      - name: Install pinned SignalLab runtime dependencies
        working-directory: Atom-SignalLab
        run: npm ci --omit=dev --ignore-scripts
      - name: Install Atom-Classifier
        run: npm ci
      - run: npm run typecheck
      - run: npm run check:observable-training-worker
      - run: npm test
      - name: Reproduce the checked-in Bayesian classifier model
        timeout-minutes: 360
        run: npm run check:signal-classifier-model
      - name: Validate the Bayesian classifier against pinned SignalLab
        timeout-minutes: 60
        run: npm run check:signal-classifier
      - name: Verify classifier publication consistency
        run: npm run check:signal-classifier-publication
